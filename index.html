<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Explorer</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>

<header>
  <div class="header-top">
    <h1>🎬 Movie Explorer</h1>
    <button id="themeToggle" class="theme-toggle" title="Toggle Dark/Light Mode">🌙</button>
  </div>

  <div class="search-box">
    <input id="searchInput" type="text" placeholder="Search movies...">
    <button id="searchBtn">Search</button>
  </div>
</header>

<main>
  <div id="movies" class="movies">
    <p class="empty">Search for movies to begin...</p>
  </div>
  <button id="loadMoreBtn" class="load-more-btn" style="display: none;">Load More</button>
</main>

<script src="index.js"></script>
</body>
</html>
